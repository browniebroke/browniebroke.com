name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    uses: browniebroke/github-actions/.github/workflows/ts-lint.yml@f62ef26d5b2705fbcbf9c48ed4619f055efa3481 # v1.26.0

  deploy:
    uses: browniebroke/github-actions/.github/workflows/netlify-deploy.yml@f62ef26d5b2705fbcbf9c48ed4619f055efa3481 # v1.26.0
    with:
      netlify_site_id: "2d3f146f-3ca0-4651-afa1-4fe16612de76"
      publish_dir: "dist"
    secrets:
      netlify_auth_token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
